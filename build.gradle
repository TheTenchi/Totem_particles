plugins {
    id 'fabric-loom' version '1.14-SNAPSHOT'
    id 'maven-publish'
}

version = '1.1.0'
group = 'com.example'
base.archivesName = 'totem_particles'

repositories {
    maven { url 'https://maven.shedaniel.me/' }
    maven { url 'https://maven.terraformersmc.com/releases/' }
}

dependencies {
    minecraft 'com.mojang:minecraft:1.21.11'
    mappings 'net.fabricmc:yarn:1.21.11+build.4:v2'
    modImplementation 'net.fabricmc:fabric-loader:0.18.5'
    modImplementation 'net.fabricmc.fabric-api:fabric-api:0.141.2+1.21.11'

    modApi 'me.shedaniel.cloth:cloth-config-fabric:21.11.153'
    modImplementation include('me.shedaniel.cloth:cloth-config-fabric:21.11.153')

    modImplementation 'com.terraformersmc:modmenu:14.0.0'
}

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}
